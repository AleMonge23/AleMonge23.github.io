 <script>
document.getElementById('loyalty-link').addEventListener('click', function(event) {
    event.preventDefault(); // Evita que se cargue otra página
    document.getElementById('modal-background').style.display = 'flex';
  });

  document.getElementById('modal-close').addEventListener('click', function() {
    document.getElementById('modal-background').style.display = 'none';
  });

  document.getElementById('modal-background').addEventListener('click', function(event) {
    if (event.target === this) {
      document.getElementById('modal-background').style.display = 'none';

  });
